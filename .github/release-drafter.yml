name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
      - 'feat'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'chore'
      - 'dependencies'
      - 'refactor'
  default: patch
categories:
  - title: '🚀 New Features'
    labels:
      - 'feature'
      - 'feat'
  - title: '✨ Enhancements'
    labels:
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
      - 'bugfix'
  - title: '🛠️ Refactoring & Maintenance'
    labels:
      - 'refactor'
      - 'cleanup'
      - 'chore'
      - 'dependencies'
  - title: '📖 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '⚙️ CI/CD'
    labels:
      - 'ci'
      - 'cd'
      - 'workflow'
  - title: '🗄️ Database'
    labels:
      - 'database'
  - title: '🧪 Tests'
    labels:
      - 'test'
      - 'tests'
autolabeler:
  - label: 'feat'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'ci'
    title:
      - '/^ci(\(.+\))?:/i'
  - label: 'test'
    title:
      - '/^test(\(.+\))?:/i'
  - label: 'enhancement'
    title:
      - '/^enhance(\(.+\))?:/i'
      - '/^perf(\(.+\))?:/i'
  - label: 'breaking'
    title:
      - '/^.+!:/i'
  - label: 'dependencies'
    title:
      - '/^(deps|build)\(.+\):/i'
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
exclude-labels:
  - 'skip-changelog'
template: |
  ## Changes

  $CHANGES
