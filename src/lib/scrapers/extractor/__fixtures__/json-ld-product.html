<!doctype html>
<html>
	<head>
		<title>JSON-LD Product | Acme</title>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@graph": [
					{
						"@type": "WebSite",
						"name": "Acme"
					},
					{
						"@type": "Product",
						"name": "JSON-LD Widget",
						"description": "A widget described via JSON-LD.",
						"image": [
							"https://cdn.example.test/json-ld-1.jpg",
							{ "@type": "ImageObject", "url": "https://cdn.example.test/json-ld-2.jpg" }
						],
						"offers": {
							"@type": "Offer",
							"price": 49.5,
							"priceCurrency": "USD"
						}
					}
				]
			}
		</script>
	</head>
	<body>
		<h1>JSON-LD Widget</h1>
	</body>
</html>
