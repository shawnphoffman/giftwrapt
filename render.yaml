databases:
  - name: giftwrapt-postgres
    plan: basic-256mb
    databaseName: giftwrapt
    postgresMajorVersion: '16'

services:
  - type: web
    name: giftwrapt
    runtime: image
    plan: starter
    healthCheckPath: /api/health
    image:
      url: ghcr.io/shawnphoffman/giftwrapt:latest
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: giftwrapt-postgres
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: SERVER_URL
        sync: false
      # Storage is optional; the app boots without it and disables uploads.
      # Add Cloudflare R2, AWS S3, or any other S3-compatible bucket after
      # the first deploy. See docs/storage.md.
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_FORCE_PATH_STYLE
        value: 'false'
      # Resend (optional). Leave unset to skip transactional email.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
