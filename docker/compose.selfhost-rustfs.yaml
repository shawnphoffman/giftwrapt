# =============================================================================
# Self-Hosted Production Stack (RustFS variant)
# =============================================================================
# Identical to compose.selfhost-garage.yaml except the bundled storage sidecar
# is RustFS instead of Garage. Migrations still run automatically on app
# startup. Pick this file if you prefer a MinIO-compatible drop-in over
# Garage's admin-API bootstrap; pick the other if you already have a working
# Garage stack and want zero churn. Don't run both at once - they bind the
# same `app` and `postgres` services.
#
# Quick start:
#   1. cp env.example docker/.env
#   2. Edit docker/.env - at minimum set POSTGRES_PASSWORD, BETTER_AUTH_SECRET,
#      and BETTER_AUTH_URL (the public URL you'll reach the app from, e.g.
#      http://192.168.1.137:3888 or https://giftwrapt.example.com).
#   3. Set STORAGE_ENDPOINT=http://rustfs:9000, STORAGE_REGION=us-east-1,
#      STORAGE_BUCKET=giftwrapt, plus any STORAGE_ACCESS_KEY_ID and
#      STORAGE_SECRET_ACCESS_KEY (RustFS accepts arbitrary strings - no GK
#      prefix or hex requirement). STORAGE_FORCE_PATH_STYLE=true.
#   4. docker compose -f docker/compose.selfhost-rustfs.yaml up -d
#   5. Open BETTER_AUTH_URL in your browser and sign up.
#
# Heads up: RustFS exposes a web console on port 9001. This compose file
# does not bind 9001 to the host - the console is reachable only from inside
# the compose network. Add a `ports: - "9001:9001"` mapping (and front it
# with auth, e.g. via reverse proxy) only if you need GUI access. Default
# console credentials are the same STORAGE_ACCESS_KEY_ID / SECRET pair.
#
# Admin CLI (if locked out):
#   docker compose -f docker/compose.selfhost-rustfs.yaml exec app \
#     node .output/scripts/admin-create.mjs \
#     --email=admin@example.com --password=SecurePass123 --name=Admin
#
# Optional MCP sidecar (talk to your wishlist through Claude Desktop / Code):
#   docker compose -f docker/compose.selfhost-rustfs.yaml --profile mcp up -d
# The `mcp` service is a thin shim over /api/mobile/v1/*. See
# https://github.com/shawnphoffman/giftwrapt-mcp for setup details.

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/shawnphoffman/giftwrapt:latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giftwrapt}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      # When the bundled RustFS sidecar is part of the stack, the app
      # entrypoint runs a bucket-create step (HeadBucket -> CreateBucket)
      # before DB migrations. Idempotent. Set to "false" (or omit) if
      # you're pointing STORAGE_* at an external S3-compatible bucket.
      INIT_RUSTFS: ${INIT_RUSTFS:-true}
    ports:
      - '${APP_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-giftwrapt}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-giftwrapt}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Optional Model Context Protocol sidecar (`--profile mcp`). Lets you
  # interact with your wishlist via Claude Desktop / Code / Web. Talks to
  # the app over the compose network using a giftwrapt apiKey (mint one
  # at /settings/devices). The image is published from the
  # shawnphoffman/giftwrapt-mcp repo. Default deployments don't include
  # this service - you opt in with the profile flag above.
  mcp:
    image: ${MCP_IMAGE:-ghcr.io/shawnphoffman/giftwrapt-mcp:latest}
    profiles: ['mcp']
    environment:
      GIFTWRAPT_BASE_URL: http://app:3000
      # Single-tenant pin: leave unset for multi-user pass-through (each
      # client sends its own Bearer header). See the giftwrapt-mcp README.
      GIFTWRAPT_API_KEY: ${GIFTWRAPT_MCP_API_KEY:-}
      # Shared-secret port gate; only meaningful when GIFTWRAPT_API_KEY is set.
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
      MCP_PORT: 8787
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-info}
    ports:
      - '${MCP_PORT:-8787}:8787'
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      # RustFS provisions root credentials at startup from these. Plumb the
      # same STORAGE_* values through so the app and the bucket share one
      # identity. RustFS accepts arbitrary strings - no format constraints.
      RUSTFS_ACCESS_KEY: ${STORAGE_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${STORAGE_SECRET_ACCESS_KEY}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    # Intentionally no host port: RustFS is only reachable on the compose
    # network. The app serves images via /api/files/* so clients never need
    # direct bucket access. To expose direct S3 URLs (faster, offloads
    # bandwidth), add a reverse-proxy rule for 9000 and set
    # STORAGE_PUBLIC_URL in .env. To expose the web console, add 9001.
    restart: unless-stopped

volumes:
  postgres_data:
  rustfs_data:
  rustfs_logs:
