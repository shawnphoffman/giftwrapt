# =============================================================================
# Self-Hosted (RustFS backend, with Traefik reverse-proxy)
# =============================================================================
# Fronts the app with Traefik on :80. App ports are closed; ingress is via the proxy. Set TRAEFIK_HOST in .env.
#
# Quick start:
#   1. cp env.example docker/.env
#   2. Edit docker/.env - at minimum set POSTGRES_PASSWORD, BETTER_AUTH_SECRET,
#      and BETTER_AUTH_URL (the public URL you'll reach the app from).
#   3. Set STORAGE_ENDPOINT=http://rustfs:9000, STORAGE_REGION=us-east-1,
#      STORAGE_BUCKET=giftwrapt, plus any STORAGE_ACCESS_KEY_ID and
#      STORAGE_SECRET_ACCESS_KEY (RustFS accepts arbitrary strings).
#      STORAGE_FORCE_PATH_STYLE=true.
#   4. docker compose -f docker/compose.selfhost-rustfs-traefik.yaml up -d
#   5. Open BETTER_AUTH_URL in your browser and sign up.
#
# Generated by `pnpm generate:compose` from scripts/compose-registry/.
# Add or change features in scripts/compose-registry/features/<id>.ts.

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/shawnphoffman/giftwrapt:latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giftwrapt}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      # When the bundled RustFS sidecar is part of the stack, the app
      # entrypoint runs a bucket-create step (HeadBucket -> CreateBucket)
      # before DB migrations. Idempotent. Set to "false" (or omit) if
      # you're pointing STORAGE_* at an external S3-compatible bucket.
      INIT_RUSTFS: ${INIT_RUSTFS:-true}
    # Traefik fronts the app on ${TRAEFIK_HOST}; ports stay closed by
    # default so the only ingress is via the proxy. Uncomment to expose
    # the app port directly (handy for debugging).
    # ports:
    #   - '${APP_PORT:-3001}:3001'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.giftwrapt.rule=Host(`${TRAEFIK_HOST:-giftwrapt.localhost}`)'
      - 'traefik.http.routers.giftwrapt.entrypoints=web'
      - 'traefik.http.services.giftwrapt.loadbalancer.server.port=3001'
      # HTTPS (uncomment after enabling the websecure entrypoint in traefik):
      # - "traefik.http.routers.giftwrapt-secure.rule=Host(`${TRAEFIK_HOST}`)"
      # - "traefik.http.routers.giftwrapt-secure.entrypoints=websecure"
      # - "traefik.http.routers.giftwrapt-secure.tls.certresolver=le"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-giftwrapt}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-giftwrapt}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Traefik reverse-proxy. Routes inbound :80 (and optionally :443) to the
  # app via Docker labels - no static config file needed. HTTPS via Let's
  # Encrypt is preconfigured but commented out so day-one deploys don't
  # require DNS first. Uncomment the websecure entrypoint, the ACME
  # resolver lines, the :443 port mapping, and the letsencrypt volume to
  # turn it on; then set ACME_EMAIL.
  traefik:
    image: traefik:v3.1
    command:
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      # HTTPS (uncomment to enable; also uncomment :443, letsencrypt volume,
      # and the *-secure router labels on the app service):
      # - "--entrypoints.websecure.address=:443"
      # - "--certificatesresolvers.le.acme.tlschallenge=true"
      # - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      # - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - '${TRAEFIK_HTTP_PORT:-80}:80'
      # - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      # RustFS provisions root credentials at startup from these. Plumb the
      # same STORAGE_* values through so the app and the bucket share one
      # identity. RustFS accepts arbitrary strings - no format constraints.
      RUSTFS_ACCESS_KEY: ${STORAGE_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${STORAGE_SECRET_ACCESS_KEY}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    # Intentionally no host port: RustFS is only reachable on the compose
    # network. The app serves images via /api/files/* so clients never need
    # direct bucket access. To expose direct S3 URLs (faster, offloads
    # bandwidth), add a reverse-proxy rule for 9000 and set
    # STORAGE_PUBLIC_URL in .env. To expose the web console, add 9001.
    restart: unless-stopped

volumes:
  postgres_data:
  rustfs_data:
  rustfs_logs:
