name: 'wishlist-dev'

# Local dev-only postgres. The deployed app (Vercel) talks to its own DB via
# Vercel env vars — this compose file never affects prod. Use with:
#
#   docker compose up -d       # start
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop and nuke data
#
# Point your local .env.local at:
#   DATABASE_URL=postgresql://postgres:password@localhost:54321/wishlist_dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: wishlist-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wishlist_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - 54321:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wishlist_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
